.chip-input:checked + .chip {

  border-color: var(--accent);
  color: #fff;
  font-weight: 700;
}
.chip-input:focus-visible + .chip {

<script>
(function() {
  // sync "その他" textarea → hidden checkbox + response field
  document.querySelectorAll('textarea[data-other-marker]').forEach(function(ta) {
    ta.addEventListener('input', function() {
      var marker = document.getElementById(ta.dataset.otherMarker);
      var respName = ta.dataset.otherResponseName;
      var existing = document.querySelector('input[name="' + respName + '"]');
      if (ta.value.trim().length > 0) {
        marker.checked = true;
        marker.disabled = false;
        if (!existing) {
          existing = document.createElement('input');
          existing.type = 'hidden';
          existing.name = respName;
          ta.closest('form').appendChild(existing);
        }
        existing.value = ta.value;
      } else {
        marker.checked = false;
        marker.disabled = true;
        if (existing) existing.remove();
      }
    });
  });

  document.getElementById('mainForm').addEventListener('submit', function(e) {
    var name = document.getElementById('nameInput').value.trim();
    var gradeChecked = document.querySelector('.grade-input:checked');
    if (!name || !gradeChecked) {
      e.preventDefault();
      document.getElementById('errorMsg').style.display = 'block';
      document.getElementById('errorMsg').scrollIntoView({behavior:'smooth', block:'center'});
      return;
    }
    document.getElementById('errorMsg').style.display = 'none';
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('submitBtn').textContent = '送信中...';
    // フォームをそのまま送信(Googleフォームのサンクスページへ遷移)
  });
})();
</script>
