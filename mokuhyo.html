<script>

document.querySelectorAll('input[data-other-marker]').forEach(function(input) {
  input.addEventListener('input', function() {
    var marker = document.getElementById(input.dataset.otherMarker);
    if (input.value.trim().length > 0) {
      marker.checked = true;
      marker.disabled = false;
      // add hidden response field
      var respName = input.dataset.otherResponseName;
      var existing = document.querySelector('input[name="' + respName + '"]');
      if (!existing) {
        existing = document.createElement('input');
        existing.type = 'hidden';
        existing.name = respName;
        input.closest('form').appendChild(existing);
      }
      existing.value = input.value;
    } else {
      marker.checked = false;
      marker.disabled = true;
      var respName = input.dataset.otherResponseName;
      var existing = document.querySelector('input[name="' + respName + '"]');
      if (existing) existing.remove();
    }
  });
});


var submitted = false;
var iframe = document.getElementById('hidden_iframe');
iframe.addEventListener('load', function() {
  if (submitted) {
    document.getElementById('formBody').classList.add('hide');
    document.getElementById('thanksScreen').classList.add('show');
    window.scrollTo(0, 0);
  }
});

document.getElementById('mainForm').addEventListener('submit', function(e) {
  var name = document.getElementById('nameInput').value.trim();
  var gradeChecked = document.querySelector('input[name="entry.480327809"]:checked');
  if (!name || !gradeChecked) {
    e.preventDefault();
    document.getElementById('errorMsg').style.display = 'block';
    return;
  }
  document.getElementById('errorMsg').style.display = 'none';
  submitted = true;
  document.getElementById('submitBtn').disabled = true;
  document.getElementById('submitBtn').textContent = '送信中...';
});
</script>
