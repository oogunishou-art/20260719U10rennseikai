<style>
:root {
  --bg: #f2f7ff;
  --bg-card: #ffffff;
  --accent: #1a7fe8;
  --text: #0d1f3c;
  --text-sub: #5a7599;
  --border: #c4d8f0;
  --chip-bg: #e4eefa;
  --input-bg: #eef5ff;
  --error: #d93025;
  --error-bg: #fff0f0;
  --error-border: #f5a8a8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: "Noto Sans JP", sans-serif;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
}
.page { max-width: 640px; margin: 0 auto; padding: 36px 18px 100px; }

/* header */
.eyebrow {
  font-family: "Barlow Condensed", sans-serif;
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.24em; text-transform: uppercase;
  color: var(--accent); margin-bottom: 8px;
}
h1.title {
  font-family: "Zen Kaku Gothic New", sans-serif;
  font-weight: 900; font-size: clamp(24px, 6vw, 32px);
  color: var(--text); line-height: 1.25; margin-bottom: 6px;
}
.lead { color: var(--text-sub); font-size: 14px; margin-bottom: 32px; }

/* 必須バッジ */
.req-badge {
  display: inline-block;
  font-size: 11px; font-weight: 700;
  color: #fff; background: var(--error);
  border-radius: 4px; padding: 1px 6px;
  margin-left: 8px; vertical-align: middle;
  letter-spacing: 0.04em;
}

/* field */
.field-block { margin-bottom: 24px; }
.field-label {
  display: flex; align-items: center;
  font-family: "Zen Kaku Gothic New", sans-serif;
  font-weight: 700; font-size: 15px; margin-bottom: 10px;
}
.text-input {
  width: 100%; padding: 13px 15px;
  border-radius: 10px; border: 1.5px solid var(--border);
  background: var(--input-bg); color: var(--text);
  font-size: 16px; font-family: inherit; appearance: none;
}
.text-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(26,127,232,0.15); }
.text-input.invalid { border-color: var(--error); background: var(--error-bg); }

/* grade chips */
.grade-row { display: flex; flex-wrap: wrap; gap: 10px; }

/* chip */
.chip-input { position: absolute; opacity: 0; width: 0; height: 0; }
.chip {
  display: inline-flex; align-items: center;
  padding: 9px 16px; border-radius: 999px;
  border: 1.5px solid var(--border);
  background: var(--chip-bg); color: var(--text);
  font-size: 14px; cursor: pointer; user-select: none;
  transition: background 0.13s, border-color 0.13s, color 0.13s;
  line-height: 1.4;
}
.chip-input:checked + .chip {
  background: var(--accent); border-color: var(--accent);
  color: #fff; font-weight: 700;
}
.chip-input:focus-visible + .chip { outline: 2px solid var(--accent); outline-offset: 3px; }

/* phase / card */
.phase { margin-top: 40px; padding-top: 28px; border-top: 2px solid var(--border); }
.phase-title {
  font-family: "Zen Kaku Gothic New", sans-serif;
  font-weight: 900; font-size: 19px; color: var(--accent); margin-bottom: 4px;
}
.phase-sub { color: var(--text-sub); font-size: 13px; margin-bottom: 20px; }

.cat-card {
  background: var(--bg-card); border: 1.5px solid var(--border);
  border-radius: 14px; padding: 18px; margin-bottom: 14px;
  box-shadow: 0 2px 8px rgba(26,127,232,0.07);
  transition: border-color 0.2s;
}
.cat-card.invalid { border-color: var(--error); background: var(--error-bg); }
.cat-header {
  display: flex; align-items: center;
  justify-content: space-between; margin-bottom: 14px;
}
.cat-title {
  font-family: "Barlow Condensed", sans-serif;
  font-size: 12px; font-weight: 700;
  letter-spacing: 0.07em; text-transform: uppercase; color: var(--accent);
}
.cat-err {
  font-size: 12px; color: var(--error); display: none;
}
.cat-card.invalid .cat-err { display: block; }

.chip-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
.chip-grid .chip { font-size: 13.5px; padding: 8px 13px; }

/* other textarea */
.other-block { margin-top: 2px; }
.other-label { display: block; font-size: 13px; color: var(--text-sub); margin-bottom: 7px; }
.other-textarea {
  width: 100%; min-height: 76px; padding: 13px 15px;
  border-radius: 10px; border: 1.5px solid var(--border);
  background: var(--input-bg); color: var(--text);
  font-size: 16px; font-family: inherit; resize: vertical;
}
.other-textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(26,127,232,0.15); }

/* grade error */
.grade-err { font-size: 13px; color: var(--error); margin-top: 8px; display: none; }

/* submit */
.global-err {
  background: var(--error-bg); border: 1.5px solid var(--error-border);
  border-radius: 10px; padding: 12px 16px;
  color: var(--error); font-size: 14px; font-weight: 700;
  margin-top: 24px; display: none;
}
.submit-btn {
  margin-top: 16px; width: 100%;
  background: var(--accent); color: #fff; border: none;
  font-family: "Zen Kaku Gothic New", sans-serif;
  font-weight: 700; font-size: 18px; padding: 18px;
  border-radius: 14px; cursor: pointer;
  box-shadow: 0 6px 20px rgba(26,127,232,0.28);
  transition: transform 0.18s, box-shadow 0.18s;
}
.submit-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(26,127,232,0.38); }
.submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

/* thanks */
.form-wrap.hide { display: none; }
.thanks { display: none; text-align: center; padding: 100px 20px; }
.thanks.show { display: block; }
.thanks h2 {
  font-family: "Zen Kaku Gothic New", sans-serif;
  font-weight: 900; font-size: 28px; color: var(--accent); margin-bottom: 12px;
}
.thanks p { color: var(--text-sub); font-size: 15px; }
</style>
</head>

<script>
(function() {
  // その他テキストエリア → hidden checkbox + response field 同期
  document.querySelectorAll('textarea[data-other-marker]').forEach(function(ta) {
    ta.addEventListener('input', function() {
      var marker = document.getElementById(ta.dataset.otherMarker);
      var respName = ta.dataset.otherResponseName;
      var existing = document.querySelector('input[name="' + respName + '"]');
      if (ta.value.trim().length > 0) {
        marker.checked = true; marker.disabled = false;
        if (!existing) {
          existing = document.createElement('input');
          existing.type = 'hidden'; existing.name = respName;
          ta.closest('form').appendChild(existing);
        }
        existing.value = ta.value;
      } else {
        marker.checked = false; marker.disabled = true;
        if (existing) existing.remove();
      }
    });
  });

  // カードの無効状態をリセット(選択されたら)
  document.querySelectorAll('.cat-card').forEach(function(card) {
    card.querySelectorAll('input[type="checkbox"]').forEach(function(cb) {
      cb.addEventListener('change', function() {
        var anyChecked = card.querySelectorAll('input[type="checkbox"]:checked').length > 0;
        if (anyChecked) card.classList.remove('invalid');
      });
    });
  });
  document.querySelectorAll('.grade-input').forEach(function(r) {
    r.addEventListener('change', function() {
      document.getElementById('gradeErr').style.display = 'none';
    });
  });
  document.getElementById('nameInput').addEventListener('input', function() {
    if (this.value.trim()) this.classList.remove('invalid');
  });

  // バリデーション
  function validate() {
    var ok = true;
    var firstErr = null;

    // 名前
    var nameEl = document.getElementById('nameInput');
    if (!nameEl.value.trim()) {
      nameEl.classList.add('invalid');
      if (!firstErr) firstErr = nameEl;
      ok = false;
    } else {
      nameEl.classList.remove('invalid');
    }

    // 学年
    var gradeChecked = document.querySelector('.grade-input:checked');
    var gradeErr = document.getElementById('gradeErr');
    if (!gradeChecked) {
      gradeErr.style.display = 'block';
      if (!firstErr) firstErr = gradeErr;
      ok = false;
    } else {
      gradeErr.style.display = 'none';
    }

    // 各カテゴリ(チェックボックスグループ)
    document.querySelectorAll('.cat-card').forEach(function(card) {
      var checked = card.querySelectorAll('input[type="checkbox"]:checked').length;
      if (checked === 0) {
        card.classList.add('invalid');
        if (!firstErr) firstErr = card;
        ok = false;
      } else {
        card.classList.remove('invalid');
      }
    });

    return { ok: ok, firstErr: firstErr };
  }

  var submitted = false;
  var iframe = document.getElementById('hidden_iframe');
  iframe.addEventListener('load', function() {
    if (submitted) {
      document.getElementById('formWrap').classList.add('hide');
      document.getElementById('thanks').classList.add('show');
      window.scrollTo(0, 0);
    }
  });

  document.getElementById('mainForm').addEventListener('submit', function(e) {
    var result = validate();
    if (!result.ok) {
      e.preventDefault();
      document.getElementById('globalErr').style.display = 'block';
      if (result.firstErr) {
        result.firstErr.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
      return;
    }
    document.getElementById('globalErr').style.display = 'none';
    submitted = true;
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('submitBtn').textContent = '送信中...';
  });
})();
</script>
